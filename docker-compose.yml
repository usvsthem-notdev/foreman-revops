version: "3.9"

services:
  foreman-revops:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - foreman_data:/app/data
    environment:
      - FOREMAN_DB_PATH=/app/data/foreman.db
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  foreman_data:
    driver: local
